general {
    # No gaps between windows or borders
    gaps_in = 5
    gaps_out = 5
    border_size = 0

    allow_tearing = true
}

decoration {
  rounding = 0

  active_opacity = 1.1
  inactive_opacity = 1.05
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.1
  dim_special = 0.7

  blur {
    enabled = 0
    size = 1
    passes = 1
    ignore_opacity = true
    new_optimizations = true
    special = false
    popups = true
    brightness = 0.7
    contrast = 1.0
  }
}

animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default

    animation = windows, 1, 4.79, easeOutQuint
        animation = windowsMove, 1, 1.00, easeOutQuint
        animation = windowsIn, 1, 1.0, easeOutQuint, popin 87%
        animation = windowsOut, 1, 0.90, linear, popin 87%

    animation = layers, 1, 3.81, easeOutQuint
        animation = layersIn, 1, 2, easeOutQuint, fade
        animation = layersOut, 1, 0.75, linear, fade

    animation = fade, 1, 2.00, quick
        animation = fadeIn, 1, 0.85, almostLinear
        animation = fadeOut, 1, 0.75, almostLinear
        animation = fadeLayersIn, 1, 0.90, almostLinear
        animation = fadeLayersOut, 1, 0.70, almostLinear

    animation = border, 1, 5.39, easeOutQuint
    animation = workspaces, 0, 0, ease

    animation = specialWorkspace, 0, 0, default
}
